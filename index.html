<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ukon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--fg:#111;--dim:#888;--brd:#ccc;--hl:#eee;--bgl:#fafafa}
.dark{--bg:#111;--fg:#eee;--dim:#555;--brd:#333;--hl:#222;--bgl:#1a1a1a}
body{background:var(--bg);color:var(--fg);font:14px/1.6 system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;transition:background .25s,color .25s}
::selection{background:var(--fg);color:var(--bg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
input,button,select{font:inherit;color:inherit;background:var(--bg);border:1px solid var(--brd);outline:none;transition:border .15s,background .15s}
input:focus,select:focus{border-color:var(--fg)}
::placeholder{color:var(--dim)}

/* -- header ------------------------------------------------------------- */
#hdr{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--brd);flex-wrap:wrap;min-height:44px}
#hdr .logo{font-size:16px;font-weight:700;letter-spacing:-.5px;user-select:none}
#hdr .hdr-r{display:flex;align-items:center;gap:4px;margin-left:auto}
.hdr-btn{width:30px;height:30px;border:none;background:transparent;border-radius:4px;cursor:pointer;font-size:12px;color:var(--dim);display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:600}
.hdr-btn:hover{background:var(--hl);color:var(--fg)}
.hdr-btn:disabled{opacity:.2;cursor:default}
.hdr-btn:disabled:hover{background:transparent}

/* -- tabs --------------------------------------------------------------- */
#tabs{display:flex;gap:0;padding:0 14px;border-bottom:1px solid var(--brd)}
#tabs .tab{font-size:12px;padding:7px 14px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;user-select:none}
#tabs .tab:hover{color:var(--fg);background:var(--hl)}
#tabs .tab.on{color:var(--fg);border-bottom-color:var(--fg)}

/* -- search bar --------------------------------------------------------- */
#search-row{display:flex;gap:0;padding:10px 14px 0;max-width:840px;margin:0 auto;width:100%}
#search-row .sr-wrap{flex:1;display:flex;position:relative;border:2px solid var(--brd);border-right:none;transition:border .15s}
#search-row .sr-wrap:focus-within{border-color:var(--fg)}
#search-row input{flex:1;height:46px;padding:0 14px;font-size:16px;border:none;min-width:0;background:transparent}
#search-row input:focus{background:transparent}
#search-row select{width:52px;height:46px;padding:0 2px;font-size:9px;cursor:pointer;appearance:none;text-align:center;border:none;border-left:1px solid var(--brd);flex-shrink:0;background:var(--bgl);color:var(--dim);letter-spacing:0;font-weight:600}
#search-row select:hover{color:var(--fg)}
#search-row button{height:46px;padding:0 18px;border:none;background:var(--fg);color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;flex-shrink:0}
#search-row button:hover{opacity:.85}
#search-row button:active{opacity:.7}

/* -- suggester ---------------------------------------------------------- */
#suggest{max-width:840px;margin:0 auto;width:100%;padding:0 14px}
#suggest div{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--dim);border-bottom:1px solid var(--brd);transition:all .1s;display:flex;gap:8px}
#suggest div:hover,#suggest div.cur{background:var(--hl);color:var(--fg)}
#suggest div .s-t{color:var(--fg);font-weight:500}
#suggest div .s-u{font-size:11px;color:var(--dim);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}

/* -- recent search dropdown --------------------------------------------- */
#recent{max-width:840px;margin:0 auto;width:100%;padding:0 14px}
#recent div{padding:7px 14px;font-size:13px;cursor:pointer;color:var(--dim);border-bottom:1px solid var(--brd);transition:all .1s;display:flex;gap:8px}
#recent div:hover{background:var(--hl);color:var(--fg)}
#recent div .r-q{color:var(--fg)}
#recent div .r-e{font-size:11px;color:var(--dim);margin-left:auto}

/* -- results ------------------------------------------------------------ */
#results{max-width:840px;margin:0 auto;width:100%;padding:10px 14px 40px;flex:1}
#results .meta{font-size:11px;color:var(--dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between}
#results .empty{padding:50px 0;text-align:center;color:var(--dim);font-size:13px}
.res-item{padding:11px 0;border-bottom:1px solid var(--brd);cursor:pointer;transition:all .1s}
.res-item:hover{padding-left:8px}
.res-item .r-t{font-size:16px;font-weight:500;color:var(--fg);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-item .r-u{font-size:12px;color:#0a4;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-item .r-d{font-size:12px;color:var(--dim);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.res-item .r-s{font-size:10px;color:var(--dim);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.res-item .r-s .badge{padding:1px 6px;background:var(--bgl);border-radius:3px}
.res-item .r-s .badge.high{background:var(--fg);color:var(--bg)}
.res-item .r-bar{height:3px;background:var(--brd);border-radius:2px;margin-top:4px;overflow:hidden}
.res-item .r-bar div{height:3px;background:var(--fg);border-radius:2px;transition:width .4s}

/* -- web search card ---------------------------------------------------- */
.web-card{padding:14px;background:var(--bgl);border-left:3px solid var(--fg);margin-bottom:12px;cursor:pointer;transition:all .15s}
.web-card:hover{background:var(--hl)}
.web-card .wc-t{font-size:15px;font-weight:600;margin-bottom:2px}
.web-card .wc-u{font-size:12px;color:var(--dim);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.web-card .wc-d{font-size:12px;color:var(--dim)}

/* -- facets ------------------------------------------------------------- */
#facets{max-width:840px;margin:0 auto;width:100%;padding:0 14px 6px;display:flex;gap:5px;flex-wrap:wrap}
#facets .facet{font-size:11px;padding:3px 9px;border:1px solid var(--brd);border-radius:3px;cursor:pointer;color:var(--dim);transition:all .1s;background:var(--bg);user-select:none}
#facets .facet:hover{border-color:var(--fg);color:var(--fg)}
#facets .facet.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}

/* -- footer ------------------------------------------------------------- */
#ftr{padding:6px 14px;border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--dim)}
#ftr .hint kbd{padding:1px 4px;border:1px solid var(--dim);border-radius:2px;font-size:10px;font-family:inherit}

/* -- modal -------------------------------------------------------------- */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#modal.open{display:flex}
#modal .box{background:var(--bg);border:1px solid var(--brd);max-width:440px;width:92%;padding:20px;max-height:75vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15)}
#modal .box h3{font-size:15px;font-weight:600;margin-bottom:12px}
#modal .row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--brd);gap:8px}
#modal .row:last-child{border-bottom:none}
#modal .row .ov{color:var(--dim);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;text-align:right;flex-shrink:0}
#modal .row button{padding:2px 8px;border:1px solid var(--brd);border-radius:3px;background:transparent;font-size:11px;cursor:pointer;color:var(--dim);transition:all .1s;flex-shrink:0}
#modal .row button:hover{color:var(--fg);border-color:var(--fg)}
#modal .act{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
#modal .act button{padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;transition:all .1s}
#modal .act .p{border:none;background:var(--fg);color:var(--bg)}
#modal .act .p:hover{opacity:.8}
#modal .act .s{border:1px solid var(--brd);background:transparent;color:var(--fg)}
#modal .act .s:hover{background:var(--hl)}

/* -- engine tag badges -------------------------------------------------- */
.eng-tag{display:inline-block;padding:1px 5px;background:var(--bgl);border-radius:2px;font-size:9px;color:var(--dim);margin-left:4px;vertical-align:middle;letter-spacing:0}

/* -- responsive --------------------------------------------------------- */
@media(max-width:500px){
  #hdr{padding:6px 10px}
  #search-row{padding:8px 10px 0;flex-wrap:wrap}
  #search-row input{font-size:15px;height:42px}
  #search-row select{width:42px;height:42px}
  #search-row button{height:42px;padding:0 14px}
  #results{padding:8px 10px 30px}
}
</style>
</head>
<body>

<!-- header -->
<div id="hdr">
  <span class="logo">ukon</span>
  <div class="hdr-r">
    <button class="hdr-btn" id="bkBtn" disabled title="Back (Alt+Left)">←</button>
    <button class="hdr-btn" id="fwBtn" disabled title="Forward (Alt+Right)">→</button>
    <button class="hdr-btn" onclick="e.nav.refresh()" title="Refresh">R</button>
    <button class="hdr-btn" onclick="e.hist.openModal()" title="History">H</button>
    <button class="hdr-btn" onclick="e.bm.openModal()" title="Bookmarks">B</button>
    <button class="hdr-btn" onclick="e.eng.openModal()" title="Engines">E</button>
    <button class="hdr-btn" id="thmBtn" onclick="e.ui.toggleDark()" title="Theme">T</button>
  </div>
</div>

<!-- tabs -->
<div id="tabs">
  <span class="tab on" data-mode="web">Web</span>
  <span class="tab" data-mode="images">Images</span>
  <span class="tab" data-mode="videos">Videos</span>
  <span class="tab" data-mode="news">News</span>
  <span class="tab" data-mode="code">Code</span>
  <span class="tab" data-mode="academic">Academic</span>
  <span class="tab" data-mode="social">Social</span>
</div>

<!-- search -->
<div id="search-row">
  <div class="sr-wrap">
    <input id="q" type="text" placeholder="" autofocus spellcheck="false" autocomplete="off">
    <select id="eng"></select>
  </div>
  <button id="goBtn">Go</button>
</div>
<div id="recent"></div>
<div id="suggest"></div>
<div id="facets"></div>
<div id="results"><div class="empty">enter a search query or url</div></div>

<!-- footer -->
<div id="ftr">
  <span>ukon engine</span>
  <span class="hint"><kbd>Tab</kbd> engine · <kbd>Esc</kbd> clear · <kbd>Up</kbd><kbd>Down</kbd> suggest</span>
</div>

<!-- modal -->
<div id="modal">
  <div class="box" id="modalBox"></div>
</div>

// ------------------------------------------------------------------------
// Levenshtein automaton (meilisearch-inspired typo tolerance)
// ------------------------------------------------------------------------
class Levenshtein {
  static distance(a,b){
    const m=a.length,n=b.length;
    if(m===0)return n;if(n===0)return m;
    let p=Array(n+1),c=Array(n+1);
    for(let i=0;i<=n;i++)p[i]=i;
    for(let i=1;i<=m;i++){
      c[0]=i;
      for(let j=1;j<=n;j++){
        const d=a[i-1]===b[j-1]?0:1;
        c[j]=Math.min(p[j]+1,c[j-1]+1,p[j-1]+d);
      }
      [p,c]=[c,p];
    }
    return p[n];
  }

  static prefix(a,b){
    const m=a.length,n=b.length;
    let mat=Array(m+1);for(let i=0;i<=m;i++)mat[i]=Array(n+1).fill(0);
    for(let i=0;i<=m;i++)mat[i][0]=i;
    for(let j=0;j<=n;j++)mat[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
      const d=a[i-1]===b[j-1]?0:1;
      mat[i][j]=Math.min(mat[i-1][j]+1,mat[i][j-1]+1,mat[i-1][j-1]+d);
    }
    let min=m;
    for(let j=0;j<=n;j++)if(mat[m][j]<min)min=mat[m][j];
    return min;
  }
}

// ------------------------------------------------------------------------
// Prefix index (typesense-inspired art-like prefix trie)
// ------------------------------------------------------------------------
class PrefixIndex {
  constructor(){this.root={};this.count=0}
  add(word,docId){
    let n=this.root;
    for(const ch of word.toLowerCase()){
      if(!n[ch])n[ch]={};
      n=n[ch];
      if(!n.docs)n.docs=new Set();
      n.docs.add(docId);
    }
    if(!n.leaf)n.leaf=new Set();
    n.leaf.add(docId);
    this.count++;
  }
  find(prefix){
    let n=this.root;
    for(const ch of prefix.toLowerCase()){
      if(!n[ch])return new Set();
      n=n[ch];
    }
    return new Set(n.docs||[]);
  }
  search(prefix,max=10){
    const ids=this.find(prefix);
    return [...ids].slice(0,max);
  }
}

// ------------------------------------------------------------------------
// Inverted index (meilisearch-inspired)
// ------------------------------------------------------------------------
class InvertedIndex {
  constructor(){
    this.terms={};
    this.docs={};
    this.prefix=new PrefixIndex();
    this.nextId=0;
  }
  addDoc(title,url,desc){
    const id=++this.nextId;
    this.docs[id]={id,title,url,desc,terms:{},time:Date.now()};
    const words=this.tokenize(title+' '+desc);
    for(const w of words){
      if(!this.terms[w])this.terms[w]=new Set();
      this.terms[w].add(id);
      this.docs[id].terms[w]=(this.docs[id].terms[w]||0)+1;
      this.prefix.add(w,id);
    }
    return id;
  }
  tokenize(text){
    return text.toLowerCase()
      .replace(/[^a-z0-9\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af\s-]/g,'')
      .split(/[\s-]+/)
      .filter(w=>w.length>0);
  }
  search(query,opts={}){
    const tokens=this.tokenize(query);
    if(!tokens.length)return[];
    let cand=null;
    for(const t of tokens){
      const s=this.terms[t];
      if(!s)return[];
      if(!cand)cand=new Set(s);
      else cand=new Set([...cand].filter(x=>s.has(x)));
    }
    if(!cand)return[];

    const qLower=query.toLowerCase();
    const results=[];
    for(const id of cand){
      const d=this.docs[id];
      let score=0;

      if(d.title.toLowerCase()===qLower)score+=1000;
      else if(d.title.toLowerCase().includes(qLower))score+=500;

      for(const t of tokens){
        const tf=d.terms[t]||0;
        score+=tf*10;
      }

      const ageHours=(Date.now()-d.time)/36e5;
      score+=Math.max(0,50-ageHours);

      const lev=Levenshtein.distance(qLower,d.title.toLowerCase());
      if(lev===0)score+=200;
      else if(lev===1)score+=100;
      else if(lev===2)score+=30;

      results.push({doc:d,score,lev});
    }

    results.sort((a,b)=>b.score-a.score);

    const facet=opts.facet;
    let filtered=facet
      ? results.filter(r=>r.doc.url.includes(facet)||r.doc.title.toLowerCase().includes(facet.toLowerCase()))
      : results;

    const limit=opts.limit||20;
    return filtered.slice(0,limit).map(r=>({...r.doc,score:r.score}));
  }

  suggest(prefix,limit=8){
    const tokens=this.tokenize(prefix);
    if(!tokens.length)return[];
    const last=tokens[tokens.length-1];
    const ids=this.prefix.search(last,limit);
    const seen=new Set();
    const res=[];
    for(const id of ids){
      const d=this.docs[id];
      if(!d||seen.has(d.url))continue;
      seen.add(d.url);
      res.push(d);
      if(res.length>=limit)break;
    }
    return res;
  }
}

// ------------------------------------------------------------------------
// Query DSL (elasticsearch-inspired simple query language)
// ------------------------------------------------------------------------
class QueryDSL {
  static parse(input){
    if(!input||!input.trim())return null;
    const q={raw:input.trim(),filters:[]};
    let rest=q.raw;
    const parts=rest.match(/(\w+):(\S+)/g);
    if(parts){
      for(const p of parts){
        const [k,v]=p.split(':');
        q.filters.push({field:k,value:v.replace(/"/g,'')});
      }
      rest=rest.replace(/(\w+):(\S+)/g,'').trim();
    }
    const siteM=rest.match(/site:(\S+)/i);
    if(siteM){q.site=siteM[1].replace(/"/g,'');rest=rest.replace(/site:\S+/i,'').trim()}
    const ftM=rest.match(/filetype:(\S+)/i);
    if(ftM){q.filetype=ftM[1].replace(/"/g,'');rest=rest.replace(/filetype:\S+/i,'').trim()}
    const phraseM=rest.match(/"([^"]+)"/);
    if(phraseM){q.phrase=phraseM[1];rest=rest.replace(/"([^"]+)"/,'').trim()}
    const negs=rest.match(/-(\S+)/g);
    if(negs){q.exclude=negs.map(n=>n.slice(1));rest=rest.replace(/-(\S+)/g,'').trim()}

    q.query=rest||q.raw;
    return q;
  }
}

// ------------------------------------------------------------------------
// URL parser
// ------------------------------------------------------------------------
class URLParser {
  static parse(input){
    if(!input||!input.trim())return null;
    input=input.trim();
    if(/^https?:\/\//i.test(input))return{type:'url',url:input};
    const sp=input.indexOf(' ');
    if(sp>0){
      const eng=ENGINES.find(e=>e.s===input.slice(0,sp));
      if(eng)return{type:'shortcut',engine:eng,query:input.slice(sp+1),url:eng.u.replace('{q}',encodeURIComponent(input.slice(sp+1)))};
    }
    if(input.includes('.')&&!input.includes(' ')){
      try{
        let t=input;if(!/^https?:\/\//i.test(t))t='https://'+t;
        new URL(t);return{type:'url',url:t};
      }catch(e){}
    }
    return{type:'search',query:input};
  }
}

// ------------------------------------------------------------------------
// Local data store
// ------------------------------------------------------------------------
class Store {
  constructor(){this.ls=window.localStorage;this.key='ukon_browser'}
  get(k){try{const r=this.ls.getItem(this.key+'_'+k);return r?JSON.parse(r):null}catch(e){return null}}
  set(k,v){try{this.ls.setItem(this.key+'_'+k,JSON.stringify(v))}catch(e){}}
}

// ------------------------------------------------------------------------
// Session / navigation
// ------------------------------------------------------------------------
class Nav {
  constructor(ui,eng,hist){
    this.ui=ui;this.eng=eng;this.hist=hist;
  }
  go(input){
    const p=URLParser.parse(input);
    if(!p)return;
    if(p.type==='url'){
      this.hist.add(input,p.url);
      window.open(p.url,'_blank');
      this.ui.status('opened '+p.url);
      return;
    }
    if(p.type==='shortcut'){
      this.hist.add(input,p.url);
      window.open(p.url,'_blank');
      this.ui.status(p.engine.n+' :: '+p.query);
      return;
    }
    if(p.type==='search'){
      this.hist.add(input,null);
      this.ui.addRecent(input);
      this.ui.showResults(p.query);
      window.location.hash='#q='+encodeURIComponent(p.query);
    }
  }
  refresh(){
    this.hist.add('(refresh)',null);
    this.ui.status('refreshed');
  }
}

// History manager
// ------------------------------------------------------------------------
class History {
  constructor(store,ui){
    this.store=store;this.ui=ui;
    this.items=store.get('history')||[];
  }
  add(raw,url){
    this.items.unshift({raw,url,time:Date.now()});
    if(this.items.length>500)this.items=this.items.slice(0,500);
    this.store.set('history',this.items);
  }
  clear(){
    if(!confirm('Clear all history?'))return;
    this.items=[];this.store.set('history',this.items);
    this.ui.status('history cleared');
    this.closeModal();
  }
  search(q){
    if(!q)return this.items;
    const l=q.toLowerCase();
    return this.items.filter(h=>(h.raw&&h.raw.toLowerCase().includes(l))||(h.url&&h.url.toLowerCase().includes(l)));
  }
  openModal(){
    const box=document.getElementById('modalBox');
    box.innerHTML=
      '<h3>History</h3>'+
      '<input id="mhQ" placeholder="search history..." oninput="e.hist.renderModal(this.value)" style="width:100%;height:34px;padding:0 10px;border:1px solid var(--brd);border-radius:4px;margin-bottom:8px;background:var(--bgl)">'+
      '<div id="mhList"></div>'+
      '<div class="act"><button class="s" onclick="e.hist.closeModal()">Close</button><button class="s" onclick="e.hist.clear()">Clear</button></div>';
    this.renderModal();
    document.getElementById('modal').classList.add('open');
  }
  renderModal(q){
    const items=q?this.search(q):this.items.slice(0,100);
    const c=document.getElementById('mhList');
    if(!items.length){c.innerHTML='<div style="color:var(--dim);font-size:12px;padding:12px 0">empty</div>';return}
    c.innerHTML=items.map(h=>
      '<div class="row" onclick="e.hist.closeModal();document.getElementById(\'q\').value=\''+(h.raw||'').replace(/'/g,"\\'")+'\';e.ui.showResults(\''+(h.raw||'').replace(/'/g,"\\'")+'\')"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer">'+(h.raw||'(url)')+'</span><span class="ov">'+(h.url||'search')+'</span></div>'
    ).join('');
  }
  closeModal(){document.getElementById('modal').classList.remove('open')}
}

// ------------------------------------------------------------------------
// Bookmarks manager
// ------------------------------------------------------------------------
class Bookmarks {
  constructor(store,ui){
    this.store=store;this.ui=ui;
    this.items=store.get('bookmarks')||[];
  }
  add(title,url){
    if(this.items.find(b=>b.url===url)){this.ui.status('already bookmarked');return}
    this.items.unshift({title,url,time:Date.now()});
    this.store.set('bookmarks',this.items);
    this.ui.status('bookmarked');
  }
  remove(id){
    this.items=this.items.filter(b=>b.id!==id);
    this.store.set('bookmarks',this.items);
  }
  openModal(){
    const box=document.getElementById('modalBox');
    box.innerHTML=
      '<h3>Bookmarks</h3>'+
      '<div id="mbList"></div>'+
      '<div class="act"><button class="s" onclick="e.bm.closeModal()">Close</button></div>';
    this.renderModal();
    document.getElementById('modal').classList.add('open');
  }
  renderModal(){
    const c=document.getElementById('mbList');
    if(!this.items.length){c.innerHTML='<div style="color:var(--dim);font-size:12px;padding:12px 0">empty</div>';return}
    c.innerHTML=this.items.map((b,i)=>
      '<div class="row"><span style="cursor:pointer" onclick="window.open(\''+b.url+'\',\'_blank\')">'+(b.title||b.url)+'</span><span class="ov">'+b.url+'</span><button onclick="e.bm.remove('+i+');e.bm.renderModal()">x</button></div>'
    ).join('');
  }
  closeModal(){document.getElementById('modal').classList.remove('open')}
}

// Engine manager
// ------------------------------------------------------------------------
class EngManager {
  constructor(store,ui){
    this.store=store;this.ui=ui;
    this.default=store.get('defaultEngine')||'google';
    this.mode='web';
  }
  setDefault(id){
    this.default=id;this.store.set('defaultEngine',id);
  }
  getCurrent(){
    return ENGINES.find(e=>e.id===this.default)||ENGINES[0];
  }
  getByMode(mode){
    if(mode==='web'||!mode)return ENGINES.filter(e=>e.cat==='web');
    return ENGINES.filter(e=>e.cat===mode);
  }
  openModal(){
    const box=document.getElementById('modalBox');
    box.innerHTML=
      '<h3>Search Engines ('+ENGINES.length+' total)</h3>'+
      '<input id="meQ" placeholder="filter engines..." oninput="e.eng.renderFiltered(this.value)" style="width:100%;height:34px;padding:0 10px;border:1px solid var(--brd);border-radius:4px;margin-bottom:8px;background:var(--bgl)">'+
      '<div id="meList"></div>'+
      '<div class="act"><button class="s" onclick="e.eng.closeModal()">Close</button></div>';
    this.renderFiltered();
    document.getElementById('modal').classList.add('open');
  }
  renderFiltered(filter){
    const c=document.getElementById('meList');
    let list=ENGINES;
    if(filter){const l=filter.toLowerCase();list=list.filter(e=>e.n.toLowerCase().includes(l)||e.id.toLowerCase().includes(l))}
    const cur=this.getCurrent();
    c.innerHTML=list.map(eng=>
      '<div class="row"><span>'+eng.n+' <span class="eng-tag">'+eng.cat+'</span><span style="color:var(--dim);font-size:11px"> /'+eng.s+'/</span></span><span class="ov">'+eng.u.replace('{q}','...').replace(/{[^}]+}/g,'...')+'</span><button onclick="e.eng.setDefault(\''+eng.id+'\');e.eng.openModal();e.ui.populateEngines()" style="'+(eng.id===cur.id?'background:var(--fg);color:var(--bg)':'')+'">'+(eng.id===cur.id?'use':'set')+'</button></div>'
    ).join('');
  }
  closeModal(){document.getElementById('modal').classList.remove('open')}
}

// ------------------------------------------------------------------------
// UI controller
// ------------------------------------------------------------------------
class UI {
  constructor(){
    this.el=document.getElementById('q');
    this.es=document.getElementById('eng');
    this.sg=document.getElementById('suggest');
    this.rs=document.getElementById('results');
    this.fc=document.getElementById('facets');
    this.rc=document.getElementById('recent');
    this.ft=document.getElementById('ftr');
    this.suggestIdx=-1;
  }

  populateEngines(mode){
    mode=mode||e.eng.mode;
    const list=e.eng.getByMode(mode);
    const def=e.eng.getCurrent();
    const inList=list.find(en=>en.id===def.id);
    this.es.innerHTML=list.map(eng=>
      '<option value="'+eng.id+'"'+(eng.id===(inList?def.id:list[0]?.id)?' selected':'')+'>'+eng.n+'</option>'
    ).join('');
    if(!inList&&list.length){
      e.eng.setDefault(list[0].id);
      this.es.value=list[0].id;
    }
  }

  status(msg){
    const ft=document.getElementById('ftr');
    ft.querySelector('span:first-child').textContent=msg;
  }

  // recent searches
  getRecents(){
    try{return JSON.parse(localStorage.getItem('ukon_browser_recents')||'[]')}catch(e){return[]}
  }
  addRecent(q){
    let r=this.getRecents();
    r=r.filter(x=>x!==q);
    r.unshift(q);
    if(r.length>20)r=r.slice(0,20);
    try{localStorage.setItem('ukon_browser_recents',JSON.stringify(r))}catch(e){}
  }
  showRecents(){
    const r=this.getRecents();
    if(!r.length||document.activeElement!==this.el||this.el.value){this.rc.innerHTML='';return}
    this.rc.innerHTML='<div style="font-size:11px;color:var(--dim);padding:4px 14px;border-bottom:1px solid var(--brd)">recent searches</div>'+
      r.slice(0,8).map(q=>
        '<div onclick="document.getElementById(\'q\').value=\''+q.replace(/'/g,"\\'")+'\';e.ui.sg.innerHTML=\'\';e.ui.rc.innerHTML=\'\';e.nav.go(\''+q.replace(/'/g,"\\'")+'\')"><span class="r-q">'+q+'</span><span class="r-e">search</span></div>'
      ).join('');
  }

  showSuggestions(items){
    if(!items||!items.length){this.sg.innerHTML='';this.suggestIdx=-1;return}
    this.suggestIdx=-1;
    this.sg.innerHTML=items.map((d,i)=>
      '<div data-idx="'+i+'" onclick="e.ui.selectSuggestion(\''+d.url+'\')"><span class="s-t">'+d.title+'</span><span class="s-u">'+d.url+'</span></div>'
    ).join('');
  }

  selectSuggestion(url){
    window.open(url,'_blank');
    this.sg.innerHTML='';
    this.suggestIdx=-1;
    this.status('opened '+url);
  }

  showResults(query){
    const parsed=QueryDSL.parse(query);
    const q=parsed?parsed.query:query;
    const opts={};
    if(parsed&&parsed.site)opts.facet=parsed.site;

    const results=corpus.search(q,opts);
    const total=results.length;

    const eng=e.eng.getCurrent();
    const webUrl=eng.u.replace('{q}',encodeURIComponent(query));

    // facets
    this.fc.innerHTML='';
    if(total>0){
      const domains={};
      for(const r of results){
        try{const d=new URL(r.url).hostname;domains[d]=(domains[d]||0)+1}catch(e){}
      }
      for(const [d,c] of Object.entries(domains).sort((a,b)=>b[1]-a[1]).slice(0,8)){
        const btn=document.createElement('span');
        btn.className='facet'+(opts.facet===d?' on':'');
        btn.textContent=(d.length>20?d.slice(0,20)+'...':d)+' ('+c+')';
        btn.onclick=()=>{
          if(opts.facet===d)delete opts.facet;
          else opts.facet=d;
          this.showResults(q);
        };
        this.fc.appendChild(btn);
      }
    }

    // web search card
    let searchCard=
      '<div class="web-card" onclick="window.open(\''+webUrl+'\',\'_blank\')">'+
        '<div class="wc-t">search <strong>'+this.escHtml(query)+'</strong> on <strong>'+eng.n+'</strong></div>'+
        '<div class="wc-u">'+this.escHtml(webUrl)+'</div>'+
        '<div class="wc-d">Click to open in new tab'+(total>0?' - local results below':'. No local results found in index.')+'</div>'+
      '</div>';

    if(!total){
      this.rs.innerHTML=searchCard;
      this.status('0 results in index - searching via '+eng.n);
      this.fc.innerHTML='<span class="facet on" style="cursor:default">local index: 0 results</span>';
      return;
    }

    const scoreMax=Math.max(...results.map(r=>r.score),1);
    this.rs.innerHTML='<div class="meta"><span>'+total+' local results</span><span>score max '+scoreMax.toFixed(0)+'</span></div>'+
      searchCard+
      results.map((r,i)=>{
        const pct=Math.round(r.score/scoreMax*100);
        return '<div class="res-item" onclick="window.open(\''+r.url+'\',\'_blank\')">'+
          '<div style="display:flex;align-items:baseline;justify-content:space-between">'+
            '<div class="r-t">'+(i+1)+'. '+this.escHtml(r.title)+'</div>'+
            '<span style="font-size:10px;color:var(--dim);flex-shrink:0;margin-left:8px">'+(r.score|0)+'</span>'+
          '</div>'+
          '<div class="r-u">'+this.escHtml(r.url)+'</div>'+
          '<div class="r-d">'+this.escHtml(r.desc||'')+'</div>'+
          '<div class="r-bar"><div style="width:'+pct+'%"></div></div>'+
          '<div class="r-s">'+
            '<span class="badge high">local</span>'+
            '<span class="badge">#'+(i+1)+'</span>'+
            '<span class="badge">'+(()=>{try{return new URL(r.url).hostname}catch(e){return''}})()+'</span>'+
          '</div>'+
        '</div>';
      }).join('');

    this.status(total+' local results - search on '+eng.n+' ('+ENGINES.length+' engines)');
  }

  escHtml(s){
    if(!s)return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  toggleDark(){
    document.body.classList.toggle('dark');
    document.getElementById('thmBtn').textContent=document.body.classList.contains('dark')?'D':'T';
    e.store.set('dark',document.body.classList.contains('dark'));
  }

  loadDark(){
    if(e.store.get('dark')){document.body.classList.add('dark');document.getElementById('thmBtn').textContent='D'}
  }
}

// Init
// ------------------------------------------------------------------------
const store=new Store();
const ui=new UI();
const eng=new EngManager(store,ui);
const hist=new History(store,ui);
const bm=new Bookmarks(store,ui);
const nav=new Nav(ui,eng,hist);
const corpus=new Corpus();

window.e={store,ui,eng,hist,bm,nav,corpus,URLParser,QueryDSL,Levenshtein};

// populate
ui.populateEngines();
ui.loadDark();

// ---- tab switching --------------------------------------------------------
document.querySelectorAll('#tabs .tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('on'));
    this.classList.add('on');
    e.eng.mode=this.dataset.mode;
    ui.populateEngines(this.dataset.mode);
    const q=document.getElementById('q').value.trim();
    if(q)ui.showResults(q);
  });
});

// ---- engine change triggers re-search ------------------------------------
document.getElementById('eng').addEventListener('change',function(){
  e.eng.setDefault(this.value);
  const q=document.getElementById('q').value.trim();
  if(q){
    ui.showResults(q);
    window.location.hash='#q='+encodeURIComponent(q);
  }
});

// ---- input events ---------------------------------------------------------
let suggestTimer=null;
document.getElementById('q').addEventListener('input',function(){
  const v=this.value.trim();
  clearTimeout(suggestTimer);
  if(!v){
    ui.sg.innerHTML='';
    ui.suggestIdx=-1;
    ui.showRecents();
    return
  }
  ui.rc.innerHTML='';
  suggestTimer=setTimeout(()=>{
    const items=corpus.suggest(v);
    ui.showSuggestions(items);
  },100);
});

document.getElementById('q').addEventListener('keydown',function(ev){
  const sug=document.querySelectorAll('#suggest div');
  if(ev.key==='ArrowDown'&&sug.length){
    ev.preventDefault();
    sug.forEach(s=>s.classList.remove('cur'));
    ui.suggestIdx=Math.min(ui.suggestIdx+1,sug.length-1);
    sug[ui.suggestIdx]?.classList.add('cur');
    return;
  }
  if(ev.key==='ArrowUp'&&sug.length){
    ev.preventDefault();
    sug.forEach(s=>s.classList.remove('cur'));
    ui.suggestIdx=Math.max(ui.suggestIdx-1,-1);
    if(ui.suggestIdx>=0)sug[ui.suggestIdx]?.classList.add('cur');
    return;
  }
  if(ev.key==='Enter'){
    if(ui.suggestIdx>=0&&sug[ui.suggestIdx]){
      sug[ui.suggestIdx].click();
      return;
    }
    ev.preventDefault();
    ui.sg.innerHTML='';
    ui.rc.innerHTML='';
    ui.suggestIdx=-1;
    nav.go(this.value);
  }
  if(ev.key==='Tab'){
    ev.preventDefault();
    const engines=document.getElementById('eng');
    const idx=engines.selectedIndex;
    engines.selectedIndex=(idx+1)%ENGINES.length;
    engines.dispatchEvent(new Event('change'));
  }
  if(ev.key==='Escape'){
    this.value='';
    ui.sg.innerHTML='';
    ui.rc.innerHTML='';
    ui.suggestIdx=-1;
    ui.fc.innerHTML='';
    ui.rs.innerHTML='<div class="empty">enter a search query or url</div>';
    ui.status('ukon engine');
    window.location.hash='';
  }
});

document.getElementById('goBtn').addEventListener('click',function(){
  ui.sg.innerHTML='';
  ui.rc.innerHTML='';
  nav.go(document.getElementById('q').value);
});

// ---- recent searches on focus ---------------------------------------------
document.getElementById('q').addEventListener('focus',function(){
  if(!this.value.trim())ui.showRecents();
});

document.getElementById('q').addEventListener('blur',function(){
  setTimeout(()=>{ui.rc.innerHTML=''},200);
});

// ---- loads hash query on page load ----------------------------------------
(function loadHash(){
  const h=window.location.hash;
  if(h&&h.startsWith('#q=')){
    const q=decodeURIComponent(h.slice(3));
    document.getElementById('q').value=q;
    nav.go(q);
  }
})();

// Focus
document.getElementById('q').focus();

// ---- Global shortcuts -----------------------------------------------------
document.addEventListener('keydown',function(ev){
  if(ev.ctrlKey&&ev.key==='l'){ev.preventDefault();document.getElementById('q').focus();document.getElementById('q').select()}
  if(ev.altKey&&ev.key==='ArrowLeft'){ev.preventDefault()}
  if(ev.altKey&&ev.key==='ArrowRight'){ev.preventDefault()}
  if(ev.key==='F5'){ev.preventDefault();nav.refresh()}
  // Ctrl+Enter: open search directly in engine
  if(ev.ctrlKey&&ev.key==='Enter'){
    const q=document.getElementById('q').value.trim();
    if(q){
      const eng=e.eng.getCurrent();
      window.open(eng.u.replace('{q}',encodeURIComponent(q)),'_blank');
    }
  }
});

console.log('ukon engine loaded');
console.log('index: '+corpus.idx.nextId+' docs');
console.log('engines: '+ENGINES.length);
})();
